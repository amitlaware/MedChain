# blockchain/config/configtx.yaml
# Channel configuration for EHR network

Organizations:

  - &OrdererOrg
    Name: OrdererMSP
    ID:   OrdererMSP
    MSPDir: ../crypto-config/ordererOrganizations/ehr.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"

  - &HospitalOrg
    Name: HospitalMSP
    ID:   HospitalMSP
    MSPDir: ../crypto-config/peerOrganizations/hospital.ehr.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('HospitalMSP.admin','HospitalMSP.peer','HospitalMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('HospitalMSP.admin','HospitalMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('HospitalMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('HospitalMSP.peer')"
    AnchorPeers:
      - Host: peer0.hospital.ehr.com
        Port: 7051

  - &DoctorOrg
    Name: DoctorMSP
    ID:   DoctorMSP
    MSPDir: ../crypto-config/peerOrganizations/doctor.ehr.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('DoctorMSP.admin','DoctorMSP.peer','DoctorMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('DoctorMSP.admin','DoctorMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('DoctorMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('DoctorMSP.peer')"
    AnchorPeers:
      - Host: peer0.doctor.ehr.com
        Port: 8051

  - &PatientOrg
    Name: PatientMSP
    ID:   PatientMSP
    MSPDir: ../crypto-config/peerOrganizations/patient.ehr.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('PatientMSP.admin','PatientMSP.peer','PatientMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('PatientMSP.admin','PatientMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('PatientMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('PatientMSP.peer')"
    AnchorPeers:
      - Host: peer0.patient.ehr.com
        Port: 9051

# ── Capabilities ──────────────────────────────────────────────────────────────
Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_5: true

# ── Application defaults ───────────────────────────────────────────────────────
Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: Signature
      # 2-of-3 orgs must endorse (production-grade endorsement policy)
      Rule: "OutOf(2, 'HospitalMSP.peer', 'DoctorMSP.peer', 'PatientMSP.peer')"
    Endorsement:
      Type: Signature
      Rule: "OutOf(2, 'HospitalMSP.peer', 'DoctorMSP.peer', 'PatientMSP.peer')"
  Capabilities:
    <<: *ApplicationCapabilities

# ── Orderer defaults ───────────────────────────────────────────────────────────
Orderer: &OrdererDefaults
  OrdererType: etcdraft
  Addresses:
    - orderer.ehr.com:7050
  EtcdRaft:
    Consenters:
      - Host: orderer.ehr.com
        Port: 7050
        ClientTLSCert: ../crypto-config/ordererOrganizations/ehr.com/orderers/orderer.ehr.com/tls/server.crt
        ServerTLSCert: ../crypto-config/ordererOrganizations/ehr.com/orderers/orderer.ehr.com/tls/server.crt
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount:    10
    AbsoluteMaxBytes:   99 MB
    PreferredMaxBytes:  512 KB
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"
  Capabilities:
    <<: *OrdererCapabilities

# ── Channel defaults ───────────────────────────────────────────────────────────
Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

# ── Profiles ──────────────────────────────────────────────────────────────────
Profiles:

  EHROrdererGenesis:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
      Capabilities:
        <<: *OrdererCapabilities
    Consortiums:
      EHRConsortium:
        Organizations:
          - *HospitalOrg
          - *DoctorOrg
          - *PatientOrg

  EHRChannel:
    Consortium: EHRConsortium
    <<: *ChannelDefaults
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *HospitalOrg
        - *DoctorOrg
        - *PatientOrg
      Capabilities:
        <<: *ApplicationCapabilities
