version: '3.7'

# ── Shared network ────────────────────────────────────────────────────────────
networks:
  ehr-network:
    name: ehr-network

# ── Shared volumes ────────────────────────────────────────────────────────────
volumes:
  orderer.ehr.com:
  peer0.hospital.ehr.com:
  peer0.doctor.ehr.com:
  peer0.patient.ehr.com:
  ipfs-data:

services:

  # ────────────────────────────────────────────────────────────────────────────
  # Certificate Authorities
  # ────────────────────────────────────────────────────────────────────────────

  ca-hospital:
    image: hyperledger/fabric-ca:1.5
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-hospital
      - FABRIC_CA_SERVER_PORT=7054
      - FABRIC_CA_SERVER_TLS_ENABLED=true
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./crypto-config/peerOrganizations/hospital.ehr.com/ca/:/etc/hyperledger/fabric-ca-server
    container_name: ca-hospital
    networks:
      - ehr-network

  ca-doctor:
    image: hyperledger/fabric-ca:1.5
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-doctor
      - FABRIC_CA_SERVER_PORT=8054
      - FABRIC_CA_SERVER_TLS_ENABLED=true
    ports:
      - "8054:8054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./crypto-config/peerOrganizations/doctor.ehr.com/ca/:/etc/hyperledger/fabric-ca-server
    container_name: ca-doctor
    networks:
      - ehr-network

  ca-patient:
    image: hyperledger/fabric-ca:1.5
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-patient
      - FABRIC_CA_SERVER_PORT=9054
      - FABRIC_CA_SERVER_TLS_ENABLED=true
    ports:
      - "9054:9054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./crypto-config/peerOrganizations/patient.ehr.com/ca/:/etc/hyperledger/fabric-ca-server
    container_name: ca-patient
    networks:
      - ehr-network

  # ────────────────────────────────────────────────────────────────────────────
  # Orderer (Raft)
  # ────────────────────────────────────────────────────────────────────────────

  orderer.ehr.com:
    container_name: orderer.ehr.com
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_GENESISMETHOD=file
      - ORDERER_GENERAL_GENESISFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./crypto-config/ordererOrganizations/ehr.com/orderers/orderer.ehr.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/ehr.com/orderers/orderer.ehr.com/tls:/var/hyperledger/orderer/tls
      - orderer.ehr.com:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"
    networks:
      - ehr-network

  # ────────────────────────────────────────────────────────────────────────────
  # Peers
  # ────────────────────────────────────────────────────────────────────────────

  peer0.hospital.ehr.com:
    container_name: peer0.hospital.ehr.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=ehr-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_PROFILE_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.hospital.ehr.com
      - CORE_PEER_ADDRESS=peer0.hospital.ehr.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.hospital.ehr.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.hospital.ehr.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.hospital.ehr.com:7051
      - CORE_PEER_LOCALMSPID=HospitalMSP
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/hospital.ehr.com/peers/peer0.hospital.ehr.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/hospital.ehr.com/peers/peer0.hospital.ehr.com/tls:/etc/hyperledger/fabric/tls
      - peer0.hospital.ehr.com:/var/hyperledger/production
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "7051:7051"
    networks:
      - ehr-network

  peer0.doctor.ehr.com:
    container_name: peer0.doctor.ehr.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=ehr-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.doctor.ehr.com
      - CORE_PEER_ADDRESS=peer0.doctor.ehr.com:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer0.doctor.ehr.com:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.doctor.ehr.com:8051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.doctor.ehr.com:8051
      - CORE_PEER_LOCALMSPID=DoctorMSP
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/doctor.ehr.com/peers/peer0.doctor.ehr.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/doctor.ehr.com/peers/peer0.doctor.ehr.com/tls:/etc/hyperledger/fabric/tls
      - peer0.doctor.ehr.com:/var/hyperledger/production
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "8051:8051"
    networks:
      - ehr-network

  peer0.patient.ehr.com:
    container_name: peer0.patient.ehr.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=ehr-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.patient.ehr.com
      - CORE_PEER_ADDRESS=peer0.patient.ehr.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.patient.ehr.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.patient.ehr.com:9051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.patient.ehr.com:9051
      - CORE_PEER_LOCALMSPID=PatientMSP
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/patient.ehr.com/peers/peer0.patient.ehr.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/patient.ehr.com/peers/peer0.patient.ehr.com/tls:/etc/hyperledger/fabric/tls
      - peer0.patient.ehr.com:/var/hyperledger/production
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "9051:9051"
    networks:
      - ehr-network

  # ────────────────────────────────────────────────────────────────────────────
  # CLI (for channel + chaincode management)
  # ────────────────────────────────────────────────────────────────────────────

  cli:
    container_name: cli
    image: hyperledger/fabric-tools:2.5
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - FABRIC_CFG_PATH=/etc/hyperledger/fabric/config
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.hospital.ehr.com:7051
      - CORE_PEER_LOCALMSPID=HospitalMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/hospital.ehr.com/peers/peer0.hospital.ehr.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/hospital.ehr.com/peers/peer0.hospital.ehr.com/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/hospital.ehr.com/peers/peer0.hospital.ehr.com/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/hospital.ehr.com/users/Admin@hospital.ehr.com/msp
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./chaincode:/opt/gopath/src/github.com/chaincode
      - ./crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto
      - ./channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
      - ./scripts:/opt/gopath/src/github.com/hyperledger/fabric/peer/scripts
      - ./config:/etc/hyperledger/fabric/config
    networks:
      - ehr-network
    depends_on:
      - orderer.ehr.com
      - peer0.hospital.ehr.com
      - peer0.doctor.ehr.com
      - peer0.patient.ehr.com

  # ────────────────────────────────────────────────────────────────────────────
  # IPFS (Kubo) Node
  # ────────────────────────────────────────────────────────────────────────────
  ipfs-node:
    container_name: ipfs-node
    image: ipfs/kubo:latest
    environment:
      - IPFS_PROFILE=server
    ports:
      - "5001:5001"
      - "8080:8080"
      - "4001:4001"
    volumes:
      - ipfs-data:/data/ipfs
    networks:
      - ehr-network
